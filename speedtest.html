<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测速站前置页</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 配置Tailwind自定义主题 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#36CFC9',
            dark: '#1D2129',
            light: '#F2F3F5'
          }
        },
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .btn-hover {
        @apply transition-all duration-300 hover:scale-105 hover:shadow-lg active:scale-95;
      }
      .card-glow {
        @apply shadow-[0_0_20px_rgba(22,93,255,0.2)];
      }
      .node-active {
        @apply bg-primary text-white;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-slate-100 dark:from-dark dark:to-slate-900 min-h-screen flex flex-col items-center justify-center p-4 text-slate-800 dark:text-slate-100 transition-colors duration-300">

  <!-- 背景装饰元素 -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <!-- 主容器 -->
  <div class="relative z-10 max-w-4xl w-full mx-auto flex flex-col items-center mb-8">

    <!-- 标题区域 -->
    <div class="text-center mb-8 w-full">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 dark:bg-primary/20 mb-6">
        <span class="text-3xl">⚡</span>
      </div>
      <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
        Lcat&杂鱼依凌 の 测速站前置页
      </h1>
      <p class="text-slate-500 dark:text-slate-400 max-w-lg mx-auto">
        请选择服务器节点，然后点击下方按钮进入对应的测速页面
      </p>
    </div>

    <!-- 服务器节点选择区域 -->
    <div class="w-full mb-10">
      <h3 class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-3 px-2 text-center">选择服务器节点</h3>
      <div class="flex flex-wrap gap-3 justify-center" id="serverNodes"></div>
    </div>

    <!-- 按钮容器 -->
    <div id="buttonContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">

      <!-- 双栈按钮（默认隐藏） -->
      <button id="dualStackBtn" class="hidden btn-hover bg-white dark:bg-slate-800 rounded-xl p-6 card-glow flex flex-col items-center justify-center text-center md:col-span-2">
        <div class="w-14 h-14 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center mb-4">
          <span class="text-2xl">🌐</span>
        </div>
        <h3 class="text-xl font-semibold mb-2">双栈通道（IPv4 / IPv6）</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400" id="dualUrlDisplay">加载中...</p>
      </button>

      <!-- IPV4按钮 -->
      <button id="ipv4Btn" class="btn-hover bg-white dark:bg-slate-800 rounded-xl p-6 card-glow flex flex-col items-center justify-center text-center">
        <div class="w-14 h-14 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center mb-4">
          <span class="text-2xl">📶</span>
        </div>
        <h3 class="text-xl font-semibold mb-2">IPV4通道</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400" id="ipv4UrlDisplay">加载中...</p>
      </button>

      <!-- IPV6按钮 -->
      <button id="ipv6Btn" class="btn-hover bg-white dark:bg-slate-800 rounded-xl p-6 card-glow flex flex-col items-center justify-center text-center">
        <div class="w-14 h-14 rounded-full bg-secondary/10 dark:bg-secondary/20 flex items-center justify-center mb-4">
          <span class="text-2xl">📡</span>
        </div>
        <h3 class="text-xl font-semibold mb-2">IPV6通道</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400" id="ipv6UrlDisplay">加载中...</p>
      </button>

    </div>

    <!-- 额外信息 -->
    <div class="mt-16 mb-8 text-center text-sm text-slate-500 dark:text-slate-400 max-w-xl">
      <p>测试结果仅供参考，实际网络性能可能受多种因素影响</p>
    </div>

  </div>

  <footer class="text-center text-xs text-slate-400 pb-4 max-w-4xl w-full mx-auto px-4">

    <div class="flex justify-center items-center gap-3 mb-4 flex-wrap text-sm md:text-base">
      <!-- IPv6支持按钮 -->
      <a href="https://www.itdog.cn/ping_ipv6/speedtest.lcatnya.top" title="本站支持IPv6访问" target="_blank" rel="noopener noreferrer" class="mx-1 hover:scale-110 transition-transform">
        <img style="display: inline-block; vertical-align: middle; border-radius: 8px;" alt="本站支持IPv6访问" src="https://img.shields.io/badge/本站支持-IPv6访问-brightgreen?style=for-the-badge">
      </a>

      <!-- SSL支持图标 -->
      <a href="https://myssl.com/speedtest.lcatnya.top" title="本站支持SSL安全访问" target="_blank" rel="noopener noreferrer" class="mx-1 hover:scale-110 transition-transform">
        <img style="display: inline-block; vertical-align: middle; border-radius: 8px;" alt="本站支持SSL安全访问" src="https://img.shields.io/badge/本站支持-SSL安全访问-green?style=for-the-badge">
      </a>

      <!-- HTTP3支持按钮 -->
      <a href="https://http3check.net/?host=https://speedtest.lcatnya.top" title="本站已支持HTTP/3" target="_blank" rel="noopener noreferrer" class="mx-1 hover:scale-110 transition-transform">
        <img style="display: inline-block; vertical-align: middle; border-radius: 8px;" alt="本站已支持HTTP/3" src="https://img.shields.io/badge/HTTP/3-已支持-yellow?style=for-the-badge">
      </a>
    </div>

    <p>
      LC（Lcat）© <span id="copyright-year-range"></span>
      测速站前置页 | 测速站本体基于开源项目 LibreSpeed |
      <a href="https://github.com/librespeed"
         class="text-primary hover:text-primary/80 font-medium underline transition-colors">
        Github Page
      </a>
    </p>

  </footer>

  <script>
    // 服务器节点配置（保持不变）
    const serverNodes = [
      {
        id: 'node1',
        name: 'Librespeed 官方测速站（含多节点）',
        ipv4Url: 'https://librespeed.org',
        ipv6Url: 'https://librespeed.org'
      },
      {
        id: 'node2',
        name: 'DMIT 美国 CN2 GIA线（千兆）',
        ipv4Url: 'http://www.lcatnya.top:59210',
        ipv6Url: 'http://www.lcatnya.top:59210'
      },
      {
        id: 'node3',
        name: '中国科学技术大学测速网站',
        ipv4Url: 'http://test.ustc.edu.cn',
        ipv6Url: 'http://test6.ustc.edu.cn'
      },
      {
        id: 'node4',
        name: '阿里云 广东深圳线（200兆峰值）',
        ipv4Url: 'http://120.24.150.149:59210',
        ipv6Url: ''
      },
      {
        id: 'node5',
        name: '腾讯云 江苏南京线（200兆峰值）',
        ipv4Url: 'https://speedtest-nor.dorimu.cn',
        ipv6Url: 'https://speedtest-nor.dorimu.cn'
      },
      {
        id: 'node6',
        name: 'Netcup 德国线（2.5G）',
        ipv4Url: 'http://159.195.53.76:59210',
        ipv6Url: 'http://[2a0a:4cc0:c1:da18::1010:113a]:59210'
      }
    ];

    let currentNodeIndex = 0;

    // 初始化函数（保持不变）
    function initServerNodes() {
      const serverNodesContainer = document.getElementById('serverNodes');
      const ipv4Btn = document.getElementById('ipv4Btn');
      const ipv6Btn = document.getElementById('ipv6Btn');
      const dualStackBtn = document.getElementById('dualStackBtn');
      const ipv4UrlDisplay = document.getElementById('ipv4UrlDisplay');
      const ipv6UrlDisplay = document.getElementById('ipv6UrlDisplay');
      const dualUrlDisplay = document.getElementById('dualUrlDisplay');

      function simplifyUrl(url) {
        return url.replace('http://', '').replace('https://', '');
      }

      function switchNode(index) {
        if (index === currentNodeIndex) return;

        // 更新旧节点 - 恢复未选中状态
        const oldBtn = document.getElementById(serverNodes[currentNodeIndex].id);
        oldBtn.className = `px-4 py-2 rounded-full text-sm transition-all duration-200 whitespace-nowrap bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700`;

        // 更新新节点 - 只保留选中状态的类
        const newBtn = document.getElementById(serverNodes[index].id);
        newBtn.className = `px-4 py-2 rounded-full text-sm transition-all duration-200 whitespace-nowrap node-active`;

        currentNodeIndex = index;
        updateButtonUrls();
      }

      function updateButtonUrls() {
        const currentNode = serverNodes[currentNodeIndex];
        const ipv4 = currentNode.ipv4Url || '';
        const ipv6 = currentNode.ipv6Url || '';

        if (ipv4 && ipv6 && ipv4 === ipv6) {
          dualStackBtn.classList.remove('hidden');
          ipv4Btn.classList.add('hidden');
          ipv6Btn.classList.add('hidden');
          dualUrlDisplay.textContent = simplifyUrl(ipv4);
          dualStackBtn.onclick = () => window.open(ipv4, '_blank');
        } else {
          dualStackBtn.classList.add('hidden');
          ipv4Btn.classList.remove('hidden');
          ipv6Btn.classList.remove('hidden');
          ipv4UrlDisplay.textContent = ipv4 ? simplifyUrl(ipv4) : '不可用';
          ipv6UrlDisplay.textContent = ipv6 ? simplifyUrl(ipv6) : '暂不支持';
          ipv4Btn.onclick = () => { if (ipv4) window.open(ipv4, '_blank'); };
          ipv6Btn.onclick = () => { if (ipv6) window.open(ipv6, '_blank'); };
        }
      }

      // 渲染节点按钮
      serverNodes.forEach((node, index) => {
        const nodeBtn = document.createElement('button');
        nodeBtn.id = node.id;
        nodeBtn.className = `px-4 py-2 rounded-full text-sm transition-all duration-200 whitespace-nowrap ${
          index === currentNodeIndex
            ? 'node-active'
            : 'bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700'
        }`;
        nodeBtn.textContent = node.name;
        nodeBtn.addEventListener('click', () => switchNode(index));
        serverNodesContainer.appendChild(nodeBtn);
      });

      updateButtonUrls();
    }

    // ✅ 统一在 DOMContentLoaded 中执行所有初始化逻辑
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 设置版权年份
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
      const startYear = 2025;
      const displayText = currentYear === startYear
        ? `${startYear}`
        : `${startYear} - ${currentYear}/${currentMonth}`;
      document.getElementById('copyright-year-range').textContent = displayText;

      // 2. 初始化服务器节点 UI
      initServerNodes();
    });
  </script>

</body>
</html>
