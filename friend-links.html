<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链 - L菌の导航站</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

    body {
        color: #333;
        min-height: 100vh;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
        background-color: #f9f9f9;
    }

        body.dark {
            color: #eee;
            background-color: #121212;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease-in-out;
            z-index: -1;
        }

        .bg-vertical { background-image: url('background/1.webp'); opacity: 0; }
        .bg-horizontal { background-image: url('background/2.webp'); opacity: 0; }

        @media (aspect-ratio < 1) {
            .bg-vertical { opacity: 1; }
            .bg-horizontal { opacity: 0; }
        }
        @media (aspect-ratio > 1) {
            .bg-vertical { opacity: 0; }
            .bg-horizontal { opacity: 1; }
        }
        @media (aspect-ratio: 1) {
            .bg-vertical { opacity: 0; }
            .bg-horizontal { opacity: 1; }
        }

        @media (aspect-ratio < 1) {
            body.dark .bg-vertical { opacity: 0.3; }
            body.dark .bg-horizontal { opacity: 0; }
        }
        @media (aspect-ratio > 1) {
            body.dark .bg-vertical { opacity: 0; }
            body.dark .bg-horizontal { opacity: 0.3; }
        }
        @media (aspect-ratio: 1) {
            body.dark .bg-vertical { opacity: 0; }
            body.dark .bg-horizontal { opacity: 0.3; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #4D1DA3;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
        }
        body.dark .theme-toggle {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffcc00;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        body.dark .theme-toggle:hover {
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: rgba(77, 29, 163, 0.2);
            color: #4D1DA3;
            text-decoration: none;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(77, 29, 163, 0.3);
        }
        body.dark .back-button {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
            border-color: rgba(255, 204, 0, 0.3);
        }
        .back-button:hover {
            background: rgba(77, 29, 163, 0.3);
            transform: translateY(-2px);
        }
        body.dark .back-button:hover {
            background: rgba(255, 204, 0, 0.3);
        }
        .back-button i {
            margin-right: 8px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s ease;
        }
        body.dark header {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #222;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
        }
        body.dark h1 {
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            transition: all 0.5s ease;
        }
        body.dark .subtitle {
            color: #ddd;
        }

        /* 友链列表样式 */

        .friend-links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .friend-link-card {
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 20px 25px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.dark .friend-link-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .friend-link-card:hover {
            transform: translateY(-6px);
        }

        .friend-avatar {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease; /* 添加过渡效果 */
        }

        .friend-avatar:hover {
            transform: scale(1.2); /* 当鼠标悬停时放大至1.2倍 */
        }

        body.dark .friend-avatar {
            border-color: rgba(255, 255, 255, 0.25);
        }

        .friend-info {
            flex: 1;
        }

        .friend-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #4D1DA3;
        }

        body.dark .friend-title {
            color: #ffcc00;
        }

        .friend-desc {
            margin-top: 6px;
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .friend-url {
            margin-top: 6px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .friend-arrow {
            font-size: 1.3rem;
            color: #4D1DA3;
            transition: transform 0.3s ease;
        }

        body.dark .friend-arrow {
            color: #ffcc00;
        }

        .friend-link-card:hover .friend-arrow {
            transform: translateX(6px);
        }

        /* 移动端改为上下结构 */
        @media (max-width: 600px) {
            .friend-link-card {
                flex-direction: column;
                text-align: center;
            }

            .friend-arrow {
                display: none;
            }
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding: 20px 0;
        }

        /* 浅色模式下 footer 链接颜色 */
        footer a {
            transition: color 0.3s ease;
            font-weight: 500; /* 中等粗细，比默认粗，不突兀 */
        }

        /* 深色模式下 footer 链接变为黄色 */
        body.dark footer a {
            color: #ffcc00;
        }

        /* ========== 返回顶部按钮样式 ========== */
        #toTop {
            width: 60px;
            height: 60px;
            border-radius: 50%; /* 圆形 */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #4D1DA3;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: fixed;
            bottom: 70px;
            right: 30px;
            z-index: 998; /* 低于主题切换按钮 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* 深色模式下的样式 */
        body.dark #toTop {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffcc00;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        /* 悬停效果 */
        #toTop:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        body.dark #toTop:hover {
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.15);
        }

        /* 点击效果 */
        #toTop:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <!-- 返回顶部按钮 -->
    <div id="toTop">
        <i class="fas fa-arrow-up"></i>
    </div>

    <div class="bg-layer bg-vertical"></div>
    <div class="bg-layer bg-horizontal"></div>

    <div class="container">
        <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回导航站
        </a>
        
        <header>
            <h1>友人帐</h1>
            <p class="subtitle">下面是一些可爱的网站~</p>
        </header>
        
        <div class="friend-links-container" id="friendContainer">
        </div>
        
        <footer>
            <div class="footer-copyright">
                Copyright © LC（Lcat）| All Rights Reserved.
                <br>© <span id="copyright-year-range"></span> By LC（Lcat）❤️
                <br>本页面所有内容均已开源 <a href="https://github.com/LhyYBMQ520/Web-backup">Github Page</a>
            </div>
        </footer>
    </div>

    <link rel="stylesheet" href="sakana-widget/sakana.min.css" />
    <!-- ✅ Sakana Widget - 固定在右下角 -->
    <div id="sakana-widget" style="
        position: fixed;
        left: 0px;
        bottom: 5px;
        z-index: 9999;
        pointer-events: auto;
    "></div>
    <script>
        function initSakanaWidget() {
            new SakanaWidget().mount('#sakana-widget');
        }
    </script>
    <script async onload="initSakanaWidget()"
        src="sakana-widget/sakana.min.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        /* ===== 版权年份 ===== */
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        const startYear = 2025;

        const displayText = currentYear === startYear 
            ? `${startYear}` 
            : `${startYear} - ${currentYear}/${currentMonth}`;

        document.getElementById('copyright-year-range').textContent = displayText;


        /* ===== 三态主题系统 ===== */
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const THEMES = {
            SYSTEM: 'system',
            LIGHT: 'light',
            DARK: 'dark'
        };

        const getSystemTheme = () => {
            return window.matchMedia('(prefers-color-scheme: dark)').matches 
                ? 'dark' 
                : 'light';
        };

        const getCurrentMode = () => {
            return localStorage.getItem('theme-mode') || THEMES.SYSTEM;
        };

        const setMode = (mode) => {
            localStorage.setItem('theme-mode', mode);
            applyTheme();
        };

        const applyTheme = () => {
            const mode = getCurrentMode();
            let finalTheme;

            if (mode === THEMES.SYSTEM) {
                finalTheme = getSystemTheme();
                themeToggle.innerHTML = '<i class="fas fa-desktop"></i>';
            } 
            else if (mode === THEMES.DARK) {
                finalTheme = 'dark';
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } 
            else {
                finalTheme = 'light';
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }

            body.classList.toggle('dark', finalTheme === 'dark');
        };

        // 点击循环切换
        themeToggle.addEventListener('click', () => {
            const mode = getCurrentMode();

            if (mode === THEMES.SYSTEM) {
                setMode(THEMES.LIGHT);
            } 
            else if (mode === THEMES.LIGHT) {
                setMode(THEMES.DARK);
            } 
            else {
                setMode(THEMES.SYSTEM);
            }
        });

        // 仅 system 模式跟随系统变化
        window.matchMedia('(prefers-color-scheme: dark)')
            .addEventListener('change', () => {
                if (getCurrentMode() === THEMES.SYSTEM) {
                    applyTheme();
                }
            });

        // 初始化主题
        applyTheme();


        /* ===== 卡片点击动画 ===== */
        document.querySelectorAll('.friend-link-card').forEach(card => {
            card.addEventListener('click', function () {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 300);
            });
        });

        /* ===== 返回顶部功能 ===== */
        const toTop = document.querySelector("#toTop");    
        toTop.style.display = "none";// 一开始隐藏  
        
        // 滚动监听事件
        window.addEventListener("scroll", scrollHandler);
        function scrollHandler(e) {        
            const distanceY = document.documentElement.scrollTop || document.body.scrollTop;//兼容写法
            if (distanceY > 100) { // 滚动超过100px时显示
                toTop.style.display = "flex";
            } else {
                toTop.style.display = "none";
            }
        }
        
        // 点击返回顶部事件
        toTop.addEventListener("click", clickHandler);
        function clickHandler(e) {
            const timer = setInterval(function () {
                const distanceY = document.documentElement.scrollTop || document.body.scrollTop;
                if (distanceY <= 0){
                    clearInterval(timer);
                    return;
                } 
                // 动态速度，先快后慢
                const speed = Math.ceil(distanceY/16);
                document.documentElement.scrollTop = distanceY - speed;
                document.body.scrollTop = distanceY - speed; // 兼容不同浏览器
            }, 16);
        }

    });

    /* ===== 从 JSON 读取友链 ===== */

    fetch('jsons/friends.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('friendContainer');

            data.forEach(item => {

                const card = document.createElement('div');
                card.className = 'friend-link-card';
                card.onclick = () => window.open(item.url, '_blank', 'noopener,noreferrer');

                card.innerHTML = `
                    <img src="${item.icon}" class="friend-avatar">
                    <div class="friend-info">
                        <div class="friend-title">${item.name}</div>
                        <div class="friend-desc">
                            ${item.desc}
                        </div>
                        <div class="friend-url">
                            ${item.url}
                        </div>
                    </div>
                    <div class="friend-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                `;

                container.appendChild(card);
            });
        })
        .catch(err => {
            console.error('友链加载失败:', err);
        });

    </script>
</body>
</html>
