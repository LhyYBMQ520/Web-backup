<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链 - L菌の导航站</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" type="text/css" href="fontawesome-free-7.2.0-web/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", "ZCOOL KuaiLe", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }

        body {
            color: #333;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.dark {
            color: #eee;
            background-color: #121212;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease-in-out;
            z-index: -1;
        }

        .bg-vertical { background-image: url('background/Arona-1.webp'); opacity: 0; }
        .bg-horizontal { background-image: url('background/Arona-2.webp'); opacity: 0; }

        @media (aspect-ratio < 1) {
        .bg-vertical { opacity: 1; }
        .bg-horizontal { opacity: 0; }
        body.dark .bg-vertical { opacity: 0.3; }
        body.dark .bg-horizontal { opacity: 0; }
        }

        @media (aspect-ratio >= 1) {
        .bg-vertical { opacity: 0; }
        .bg-horizontal { opacity: 1; }
        body.dark .bg-vertical { opacity: 0; }
        body.dark .bg-horizontal { opacity: 0.3; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #F97316;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
        }
        body.dark .theme-toggle {
            background: rgba(0, 0, 0, 0.3);
            color: #3B82F6;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            transition: all 0.5s ease;
        }
        body.dark header {
            background: rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #222;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
            font-weight: 800;
        }
        body.dark h1 {
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
            transition: all 0.5s ease;
        }
        body.dark .subtitle {
            color: #ddd;
        }

        .friend-links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .friend-link-card {
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 20px 25px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.dark .friend-link-card {
            background: rgba(0, 0, 0, 0.4);
        }

        .friend-link-card:hover {
            transform: translateY(-6px);
        }

        .friend-avatar {
            width: 75px;
            height: 75px;
            border-radius: 20px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .friend-avatar:hover {
            transform: scale(1.2);
        }

        .friend-info {
            flex: 1;
        }

        .friend-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1E40AF;
        }

        body.dark .friend-title {
            color: #E69AA8;
        }

        .friend-desc {
            margin-top: 6px;
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .friend-url {
            margin-top: 6px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .friend-arrow {
            font-size: 1.3rem;
            color: #1E40AF;
            transition: transform 0.3s ease;
        }

        body.dark .friend-arrow {
            color: #E69AA8;
        }

        .friend-link-card:hover .friend-arrow {
            transform: translateX(5px);
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding: 20px 0;
        }

        footer a {
            transition: color 0.3s ease;
            font-weight: 500;
        }

        body.dark footer a {
            color: #ffcc00;
        }

        #toTop {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            color: #1E40AF;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: fixed;
            bottom: 70px;
            right: 20px;
            z-index: 998;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        body.dark #toTop {
            background: rgba(0, 0, 0, 0.4);
            color: #E69AA8;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        #toTop:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        body.dark #toTop:hover {
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.15);
        }

        #toTop:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .friend-link-card {
                flex-direction: column;
                text-align: center;
            }

            .friend-arrow {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i> <!-- 默认显示月亮图标 -->
    </div>

    <!-- 返回顶部按钮 -->
    <div id="toTop">
        <i class="fas fa-arrow-up"></i> <!-- 向上箭头图标 -->
    </div>

    <!-- 背景图层：竖屏/横屏切换 -->
    <div class="bg-layer bg-vertical"></div>
    <div class="bg-layer bg-horizontal"></div>

    <!-- 主内容容器 -->
    <div class="container">
        <!-- 页面头部 -->
        <header>
            <h1>友人帐</h1>
            <p class="subtitle">下面是一些可爱的网站~</p>
        </header>
        
        <!-- 友链列表容器（JS动态生成内容） -->
        <div class="friend-links-container" id="friendContainer">
        </div>
        
        <!-- 页脚 -->
        <footer>
            <div class="footer-copyright">
                Copyright © LC（Lcat）| All Rights Reserved.
                <br>© <span id="copyright-year-range"></span> By LC（Lcat）❤️
                <br>本页面所有内容均已开源 <a href="https://github.com/LhyYBMQ520/Web-backup">Github Page</a>
            </div>
        </footer>
    </div>

    <!-- 引入Sakana Widget（摇曳小人）样式 -->
    <link rel="stylesheet" href="sakana-widget/sakana.min.css" />
    <!-- Sakana Widget容器：固定在左下角 -->
    <div id="sakana-widget" style="
        position: fixed;
        left: -20px;
        bottom: 5px;
        z-index: 9999; /* 最高层级 */
        pointer-events: auto; /* 允许鼠标交互 */
    "></div>
    <script>
        // 初始化Sakana Widget
        function initSakanaWidget() {
            new SakanaWidget().mount('#sakana-widget'); // 挂载到指定容器
        }
    </script>
    <!-- 异步加载Sakana Widget脚本，加载完成后执行初始化 -->
    <script async onload="initSakanaWidget()"
        src="sakana-widget/sakana.min.js"></script>

    <script>
    // 页面DOM加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {

        /* ===== 版权年份动态生成 ===== */
        const now = new Date(); // 获取当前时间
        const currentYear = now.getFullYear(); // 当前年份
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0'); // 当前月份（补零）
        const startYear = 2025; // 起始年份

        // 拼接版权年份文本：如果当前年等于起始年，只显示起始年；否则显示 起始年-当前年/当前月
        const displayText = currentYear === startYear 
            ? `${startYear}` 
            : `${startYear} - ${currentYear}/${currentMonth}`;

        // 将文本插入到页面
        document.getElementById('copyright-year-range').textContent = displayText;


        /* ===== 三态主题切换系统（系统/浅色/深色） ===== */
        const themeToggle = document.getElementById('themeToggle'); // 获取主题切换按钮
        const body = document.body; // 获取body元素

        // 主题常量定义
        const THEMES = {
            SYSTEM: 'system', // 跟随系统
            LIGHT: 'light',   // 浅色模式
            DARK: 'dark'      // 深色模式
        };

        // 获取系统主题
        const getSystemTheme = () => {
            // 判断系统是否偏好深色模式
            return window.matchMedia('(prefers-color-scheme: dark)').matches 
                ? 'dark' 
                : 'light';
        };

        // 获取当前主题模式（优先从localStorage读取，默认跟随系统）
        const getCurrentMode = () => {
            return localStorage.getItem('theme-mode') || THEMES.SYSTEM;
        };

        // 设置主题模式（存入localStorage并应用）
        const setMode = (mode) => {
            localStorage.setItem('theme-mode', mode); // 保存到本地存储
            applyTheme(); // 应用主题
        };

        // 应用主题样式
        const applyTheme = () => {
            const mode = getCurrentMode(); // 获取当前模式
            let finalTheme; // 最终应用的主题

            // 根据模式判断最终主题，并切换按钮图标
            if (mode === THEMES.SYSTEM) {
                finalTheme = getSystemTheme(); // 跟随系统
                themeToggle.innerHTML = '<i class="fas fa-desktop"></i>'; // 显示桌面图标
            } 
            else if (mode === THEMES.DARK) {
                finalTheme = 'dark'; // 深色模式
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; // 显示月亮图标
            } 
            else {
                finalTheme = 'light'; // 浅色模式
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; // 显示太阳图标
            }

            // 切换body的dark类（控制深色模式样式）
            body.classList.toggle('dark', finalTheme === 'dark');
        };

        // 主题切换按钮点击事件：循环切换（系统→浅色→深色→系统）
        themeToggle.addEventListener('click', () => {
            const mode = getCurrentMode();

            if (mode === THEMES.SYSTEM) {
                setMode(THEMES.LIGHT); // 切换到浅色
            } 
            else if (mode === THEMES.LIGHT) {
                setMode(THEMES.DARK); // 切换到深色
            } 
            else {
                setMode(THEMES.SYSTEM); // 切换到跟随系统
            }
        });

        // 监听系统主题变化：仅当当前模式为SYSTEM时，跟随系统变化
        window.matchMedia('(prefers-color-scheme: dark)')
            .addEventListener('change', () => {
                if (getCurrentMode() === THEMES.SYSTEM) {
                    applyTheme();
                }
            });

        // 页面初始化时应用主题
        applyTheme();

        /* ===== 返回顶部功能 ===== */
        const toTop = document.querySelector("#toTop");    // 获取返回顶部按钮  
        toTop.style.display = "none";// 初始状态隐藏按钮  

    // 监听页面滚动事件
        window.addEventListener("scroll", scrollHandler);
        function scrollHandler(e) {        
            // 简化scrollTop兼容写法（使用document.documentElement.scrollTop即可兼容现代浏览器）
            const distanceY = document.documentElement.scrollTop;
            // 滚动超过100px时显示按钮，否则隐藏
            if (distanceY > 100) { 
                toTop.style.display = "flex";
            } else {
                toTop.style.display = "none";
            }
        }

    // 点击返回顶部按钮的处理函数（改用原生scrollTo实现平滑滚动）
        toTop.addEventListener("click", clickHandler);
        function clickHandler(e) {
            // 原生API实现平滑滚动，无需定时器
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 平滑滚动效果，浏览器原生支持
            });
        }

    });

    /* ===== 从JSON文件加载友链数据并动态生成卡片 ===== */
    fetch('jsons/friends.json') // 请求JSON文件
        .then(response => response.json()) // 解析JSON响应
        .then(data => {
            const container = document.getElementById('friendContainer'); // 获取友链容器

            // 遍历友链数据，生成每个卡片
            data.forEach(item => {

                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'friend-link-card'; // 添加样式类
                // 卡片点击事件：在新标签页打开友链（noopener/noreferrer提升安全性）
                card.onclick = () => window.open(item.url, '_blank', 'noopener,noreferrer');

                // 卡片内部HTML结构
                card.innerHTML = `
                    <img src="${item.icon}" class="friend-avatar"> <!-- 头像 -->
                    <div class="friend-info"> <!-- 信息容器 -->
                        <div class="friend-title">${item.name}</div> <!-- 网站名称 -->
                        <div class="friend-desc">
                            ${item.desc} <!-- 网站描述 -->
                        </div>
                        <div class="friend-url">
                            ${item.url} <!-- 网站网址 -->
                        </div>
                    </div>
                    <div class="friend-arrow"> <!-- 箭头图标 -->
                        <i class="fas fa-arrow-right"></i>
                    </div>
                `;

                // 将卡片添加到容器中
                container.appendChild(card);
            });
        })
        .catch(err => {
            // 捕获加载失败错误并打印
            console.error('友链加载失败:', err);
        });

    </script>
</body>
</html>
