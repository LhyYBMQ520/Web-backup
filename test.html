<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lcat - 测试页面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", "ZCOOL KuaiLe", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            /* 添加页面居中样式 */
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 定义文本样式 */
        .empty-message {
            font-size: 72px; /* 大字大小 */
            font-weight: 600; /* 字体加粗 */
            color: #333; /* 文字颜色 */
            text-align: center; /* 文本居中（兼容不同屏幕） */
            font-family: "ZCOOL KuaiLe", sans-serif; /* 使用更有特色的字体 */
        }
    </style>
</head>
<body>
    <!-- 添加居中显示的文本元素 -->
    <div class="empty-message">这里没有内容哦~</div>
</body>
</html>
