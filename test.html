<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lcat - 测试页面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", "ZCOOL KuaiLe", -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
            padding: 20px;
        }

        .empty-message {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 600;
            color: #4a5568;
            text-align: center;
            font-family: "ZCOOL KuaiLe", sans-serif;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% {
                transform: translateY(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-6px);
                opacity: 0.92;
            }
        }

    </style>
</head>
<body>
    <p class="empty-message">这里暂时没有内容哦~</p>
</body>
</html>
