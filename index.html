<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L菌の导航站</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", "ZCOOL KuaiLe", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }

        body {
            color: #333;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.dark {
            color: #eee;
            background-color: #121212;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease-in-out;
            z-index: -1;
        }

        .bg-vertical { background-image: url('background/Miao-1.webp'); opacity: 0; }
        .bg-horizontal { background-image: url('background/Miao-2.webp'); opacity: 0; }

        @media (aspect-ratio < 1) {
        .bg-vertical { opacity: 1; }
        .bg-horizontal { opacity: 0; }

        body.dark .bg-vertical { opacity: 0.3; }
        body.dark .bg-horizontal { opacity: 0; }
        }

        @media (aspect-ratio >= 1) {
        .bg-vertical { opacity: 0; }
        .bg-horizontal { opacity: 1; }

        body.dark .bg-vertical { opacity: 0; }
        body.dark .bg-horizontal { opacity: 0.3; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #F97316;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
        }
        body.dark .theme-toggle {
            background: rgba(0, 0, 0, 0.3);
            color: #3B82F6;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            transition: all 0.5s ease;
        }
        body.dark header {
            background: rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #222;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
            font-weight: 800;
        }
        body.dark h1 {
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
            transition: all 0.5s ease;
        }
        body.dark .subtitle {
            color: #ddd;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            min-height: 275px; /* 保证卡片最小高度，避免内容过少时太矮 */
            height: auto; /* 高度随内容自适应 */
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }
        body.dark .grid-item {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .grid-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.35);
        }
        body.dark .grid-item:hover {
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
            background: rgba(0, 0, 0, 0.5);
        }

        .grid-item:active {
            transform: scale(0.95);
        }

        .item-header {
            padding: 25px 20px 15px;
            background: rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }
        body.dark .item-header {
            background: rgba(0, 0, 0, 0.45);
        }

        .item-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
            color: #4D1DA3;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }
        body.dark .item-title {
            color: #ffcc00;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .item-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .item-desc {
            font-size: 1.05rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
            transition: all 0.5s ease;
        }
        body.dark .item-desc {
            color: #ddd;
        }

        .item-footer {
            margin-top: auto;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 30px;
            transition: all 0.5s ease;
        }
        body.dark .item-footer {
            background: rgba(0, 0, 0, 0.45);
        }

        .category-tag {
            color: #333;
            padding: 8px 15px;
            font-weight: 500;
            transition: all 0.5s ease;
        }
        body.dark .category-tag {
            color: #ddd;
        }

        .item-link {
            color: #4D1DA3;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }
        body.dark .item-link {
            color: #ffcc00;
        }

        .item-link i {
            margin-left: 3px;
            transition: transform 0.5s;
        }
        .grid-item:hover .item-link i {
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 0.9rem;
            color: #444;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        body.dark footer {
            color: #ddd;
        }
        
        body.dark footer a {
            color: #ffcc00;
        }

        .friend-link {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(77, 29, 163, 0.3);
            color: #4D1DA3;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            pointer-events: none;
        }

        body.dark .friend-link {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
        }

        .friend-link:hover {
            background: rgba(77, 29, 163, 0.5);
            transform: translateY(-50%) scale(1.05);
        }

        body.dark .friend-link:hover {
            background: rgba(255, 204, 0, 0.4);
        }

        header.active h1,
        header.active .subtitle {
            transform: translateX(-200px);
            transition: transform 0.5s ease;
        }

        header.active .friend-link {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        #toTop {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            color: #4D1DA3;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: fixed;
            bottom: 70px;
            right: 20px;
            z-index: 998;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        body.dark #toTop {
            background: rgba(0, 0, 0, 0.4);
            color: #ffcc00;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        #toTop:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        body.dark #toTop:hover {
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.15);
        }

        #toTop:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            h1 {
                font-size: 2.2rem;
            }
            .item-title {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .item-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

        <i class="fas fa-moon"></i>
    </div>

    <div id="toTop">

    <div class="bg-layer bg-vertical"></div>
    <div class="bg-layer bg-horizontal"></div>

    <div class="container">
        <header>

    <link rel="stylesheet" href="sakana-widget/sakana.min.css" />
    <div id="sakana-widget" style="
        position: fixed;
        left: -20px;
        bottom: 5px;
        z-index: 9999;
        pointer-events: auto;
    "></div>
    <script>
        function initSakanaWidget() {
            new SakanaWidget().mount('#sakana-widget');
        }
    </script>
    <script async onload="initSakanaWidget()"
        src="sakana-widget/sakana.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            /* ===== 版权年份动态生成 ===== */
            const now = new Date();
            const currentYear = now.getFullYear(); // 当前年份
            const currentMonth = String(now.getMonth() + 1).padStart(2, '0'); // 当前月份（补零）
            const startYear = 2025; // 起始年份

            // 生成显示文本：如果当前年等于起始年，只显示起始年；否则显示范围
            const displayText = currentYear === startYear 
                ? `${startYear}` 
                : `${startYear} - ${currentYear}/${currentMonth}`;

            // 将生成的文本插入到页面中
            document.getElementById('copyright-year-range').textContent = displayText;


            /* ===== 三态主题系统（系统/亮色/暗色） ===== */
            const themeToggle = document.getElementById('themeToggle'); // 获取主题切换按钮
            const body = document.body; // 获取body元素

            // 定义主题常量
            const THEMES = {
                SYSTEM: 'system',  // 跟随系统
                LIGHT: 'light',    // 亮色模式
                DARK: 'dark'       // 暗色模式
            };

            // 获取系统主题偏好
            const getSystemTheme = () => {
                // 判断系统是否偏好暗色模式
                return window.matchMedia('(prefers-color-scheme: dark)').matches 
                    ? 'dark' 
                    : 'light';
            };

            // 获取当前保存的主题模式（从本地存储读取）
            const getCurrentMode = () => {
                return localStorage.getItem('theme-mode') || THEMES.SYSTEM;
            };

            // 设置主题模式并保存到本地存储
            const setMode = (mode) => {
                localStorage.setItem('theme-mode', mode); // 保存到本地存储
                applyTheme(); // 应用主题
            };

            // 应用主题样式
            const applyTheme = () => {
                const mode = getCurrentMode(); // 获取当前模式
                let finalTheme; // 最终要应用的主题

                // 根据不同模式确定最终主题
                if (mode === THEMES.SYSTEM) {
                    finalTheme = getSystemTheme(); // 跟随系统
                    themeToggle.innerHTML = '<i class="fas fa-desktop"></i>'; // 显示桌面图标
                } 
                else if (mode === THEMES.DARK) {
                    finalTheme = 'dark'; // 暗色模式
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; // 显示月亮图标
                } 
                else {
                    finalTheme = 'light'; // 亮色模式
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; // 显示太阳图标
                }

                // 切换body的dark类来应用深色模式样式
                body.classList.toggle('dark', finalTheme === 'dark');
            };

            // 点击主题按钮循环切换模式：系统 → 亮色 → 暗色 → 系统
            themeToggle.addEventListener('click', () => {
                const mode = getCurrentMode();

                if (mode === THEMES.SYSTEM) {
                    setMode(THEMES.LIGHT); // 切换到亮色
                } 
                else if (mode === THEMES.LIGHT) {
                    setMode(THEMES.DARK); // 切换到暗色
                } 
                else {
                    setMode(THEMES.SYSTEM); // 切换到系统
                }
            });

            // 监听系统主题变化（仅在系统模式下生效）
            window.matchMedia('(prefers-color-scheme: dark)')
                .addEventListener('change', () => {
                    if (getCurrentMode() === THEMES.SYSTEM) {
                        applyTheme(); // 重新应用主题
                    }
                });

            // 页面加载时初始化主题
            applyTheme();


            /* ===== Header交互效果（显示友链入口） ===== */
            const header = document.querySelector('header'); // 获取头部元素

            // 鼠标进入头部时激活（显示友链）
            header.addEventListener('mouseenter', () => {
                header.classList.add('active');
            });

            // 鼠标离开头部时取消激活（隐藏友链）
            header.addEventListener('mouseleave', () => {
                header.classList.remove('active');
            });

            // 点击头部时切换激活状态（除了友链链接本身）
            header.addEventListener('click', (e) => {
                if (e.target === header || e.target.closest('.friend-link')) return;
                header.classList.toggle('active');
            });

            /* ===== 从JSON文件加载导航模块 ===== */
            // 从指定JSON文件获取导航数据
            fetch('jsons/modules.json')
                .then(res => res.json()) // 解析JSON数据
                .then(data => {
                    const container = document.getElementById('moduleContainer'); // 获取卡片容器

                    // 遍历数据生成每个导航卡片
                    data.forEach(item => {

                        // 创建卡片元素
                        const card = document.createElement('div');
                        card.className = 'grid-item'; // 添加样式类
                        // 点击卡片打开链接（新窗口）
                        card.onclick = () => window.open(item.link, '_blank', 'noopener,noreferrer');

                        // 卡片内部HTML结构
                        card.innerHTML = `
                            <div class="item-header">
                                <h3 class="item-title">${item.name}</h3> <!-- 卡片标题 -->
                            </div>
                            <div class="item-content">
                                <p class="item-desc">${item.desc}</p> <!-- 卡片描述 -->
                                <div class="item-footer">
                                    <span class="category-tag">${item.tag}</span> <!-- 分类标签 -->
                                    <div class="item-link">
                                        访问 <i class="fas fa-arrow-right"></i> <!-- 访问文字+箭头 -->
                                    </div>
                                </div>
                            </div>
                        `;

                        // 将卡片添加到容器中
                        container.appendChild(card);
                    });

                    // 为生成的卡片绑定点击动画
                    document.querySelectorAll('.grid-item').forEach(item => {
                        item.addEventListener('click', function () {
                            this.style.transform = 'scale(0.95)'; // 点击时缩小
                            setTimeout(() => {
                                this.style.transform = ''; // 300ms后恢复
                            }, 300);
                        });
                    });
                })
                .catch(err => {
                    // 加载失败时在控制台输出错误
                    console.error('模块加载失败:', err);
                });

            /* ===== 返回顶部功能 ===== */
            const toTop = document.querySelector("#toTop");    // 获取返回顶部按钮  
            toTop.style.display = "none";// 初始状态隐藏按钮  

            // 监听页面滚动事件
            window.addEventListener("scroll", scrollHandler);
            function scrollHandler(e) {        
                // 简化scrollTop兼容写法（使用document.documentElement.scrollTop即可兼容现代浏览器）
                const distanceY = document.documentElement.scrollTop;
                // 滚动超过100px时显示按钮，否则隐藏
                if (distanceY > 100) { 
                    toTop.style.display = "flex";
                } else {
                    toTop.style.display = "none";
                }
            }

            // 点击返回顶部按钮的处理函数（改用原生scrollTo实现平滑滚动）
            toTop.addEventListener("click", clickHandler);
            function clickHandler(e) {
                // 原生API实现平滑滚动，无需定时器
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth' // 平滑滚动效果，浏览器原生支持
                });
            }

        });
    </script>
</body>
</html>
