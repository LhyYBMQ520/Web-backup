<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L菌の导航站</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: #333;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
            background-color: #f9f9f9;
        }

        body.dark {
            color: #eee;
            background-color: #121212;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease-in-out;
            z-index: -1;
        }

        .bg-vertical { background-image: url('background/1.webp'); opacity: 0; }
        .bg-horizontal { background-image: url('background/2.webp'); opacity: 0; }

        @media (aspect-ratio < 1) {
            .bg-vertical { opacity: 1; }
            .bg-horizontal { opacity: 0; }
        }
        @media (aspect-ratio > 1) {
            .bg-vertical { opacity: 0; }
            .bg-horizontal { opacity: 1; }
        }
        @media (aspect-ratio: 1) {
            .bg-vertical { opacity: 0; }
            .bg-horizontal { opacity: 1; }
        }

        @media (aspect-ratio < 1) {
            body.dark .bg-vertical { opacity: 0.3; }
            body.dark .bg-horizontal { opacity: 0; }
        }
        @media (aspect-ratio > 1) {
            body.dark .bg-vertical { opacity: 0; }
            body.dark .bg-horizontal { opacity: 0.3; }
        }
        @media (aspect-ratio: 1) {
            body.dark .bg-vertical { opacity: 0; }
            body.dark .bg-horizontal { opacity: 0.3; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #4D1DA3;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
        }
        body.dark .theme-toggle {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffcc00;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        body.dark .theme-toggle:hover {
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s ease;
        }
        body.dark header {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #222;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
        }
        body.dark h1 {
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            transition: all 0.5s ease;
        }
        body.dark .subtitle {
            color: #ddd;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            height: 280px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark .grid-item {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .grid-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.25);
        }
        body.dark .grid-item:hover {
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
            background: rgba(0, 0, 0, 0.5);
        }

        .grid-item:active {
            transform: scale(0.97);
        }

        .item-header {
            padding: 25px 20px 15px;
            background: rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }
        body.dark .item-header {
            background: rgba(0, 0, 0, 0.45);
        }

        .item-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            color: #4D1DA3;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }
        body.dark .item-title {
            color: #ffcc00;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .item-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .item-desc {
            font-size: 1.05rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center;
            opacity: 0.95;
            font-weight: 500;
            transition: all 0.5s ease;
        }
        body.dark .item-desc {
            color: #ddd;
        }

        .item-footer {
            margin-top: auto;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.22);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.5s ease;
        }
        body.dark .item-footer {
            background: rgba(0, 0, 0, 0.45);
        }

        .category-tag {
            background: rgba(255, 255, 255, 0.3);
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.5s ease;
        }
        body.dark .category-tag {
            background: rgba(0, 0, 0, 0.5);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .item-link {
            color: #4D1DA3;
            font-weight: 500;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }
        body.dark .item-link {
            color: #ffcc00;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .item-link i {
            margin-left: 5px;
            transition: transform 0.3s;
        }
        .grid-item:hover .item-link i {
            transform: translateX(5px);
        }

        /* 核心修改：添加 font-weight: 500 增大页脚文字字重 */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 10px 20px;
            font-size: 0.9rem;
            color: #444;
            font-weight: 500; /* 中等粗细，比默认粗，不突兀 */
            transition: color 0.5s ease;
        }
        body.dark footer {
            color: #ddd;
            /* 暗色模式继承字重，无需额外设置 */
        }
        
            /* 新增：深色模式下页脚链接的颜色 */
        body.dark footer a {
            color: #ffcc00; /* 与 item-title 在深色模式下的颜色一致 */
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            h1 {
                font-size: 2.2rem;
            }
            .item-title {
                font-size: 1.6rem;
            }
            .theme-toggle {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }
        }
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .item-title {
                font-size: 1.5rem;
            }
            .theme-toggle {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }

        /* 友链入口样式 */
        .friend-link {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(77, 29, 163, 0.2);
            color: #4D1DA3;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(77, 29, 163, 0.3);
            pointer-events: none; /* 默认不可点击 */
        }

        body.dark .friend-link {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
            border-color: rgba(255, 204, 0, 0.3);
        }

        /* 悬停/激活时的效果 */
        header.active h1,
        header.active .subtitle {
            transform: translateX(-200px);
            transition: transform 0.4s ease;
        }

        header.active .friend-link {
            opacity: 1;
            visibility: visible;
            pointer-events: auto; /* 可点击 */
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="bg-layer bg-vertical"></div>
    <div class="bg-layer bg-horizontal"></div>

    <div class="container">
        <header>
            <h1>L菌の导航站</h1>
            <p class="subtitle">抚摸我可以显示友链入口哦~❤️</p>
            <p class="subtitle">点击下方方格访问不同的内容模块</p>
            <!-- 新增：友链入口 -->
            <a href="friend-links.html" class="friend-link" target="_blank">这里是友链入口哦~</a>
        </header>
        
        <div class="grid-container" id="moduleContainer"></div>
        
    <footer>
        <!-- 功能图标区域 -->
        <div class="footer-icons">
            <a href="https://ipw.cn/ipv6webcheck/?site=https://www.lcatnya.top" title="本站支持IPv6访问" target="_blank">
                <img style="display: inline-block; vertical-align: middle;" alt="本站支持IPv6访问" src="https://static.ipw.cn/icon/ipv6-s1.svg"></a>
            <a href="https://ipw.cn/ssl/?site=https://www.lcatnya.top" title="本站支持SSL安全访问" target="_blank">

        <!-- 版权信息区域 -->
        <div class="footer-copyright">
            LC（Lcat）© <span id="copyright-year-range"></span> | 
            页面部分源码由AI生成 |

    </div>

    <!-- https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.css -->
    <!-- https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.js -->
    <!-- https://cdnjs.cloudflare.com/ajax/libs/sakana-widget/2.7.1/sakana.min.css -->
    <!-- https://cdnjs.cloudflare.com/ajax/libs/sakana-widget/2.7.1/sakana.min.js -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sakana-widget/2.7.1/sakana.min.css" />
    <!-- ✅ Sakana Widget - 固定在右下角 -->
    <div id="sakana-widget" style="
        position: fixed;
        right: 0px;
        bottom: 5px;
        z-index: 9999;
        pointer-events: auto;
    "></div>
    <script>
        function initSakanaWidget() {
            new SakanaWidget().mount('#sakana-widget');
        }
    </script>
    <script async onload="initSakanaWidget()"
        src="https://cdnjs.cloudflare.com/ajax/libs/sakana-widget/2.7.1/sakana.min.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        /* ===== 版权年份 ===== */
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        const startYear = 2025;

        const displayText = currentYear === startYear 
            ? `${startYear}` 
            : `${startYear} - ${currentYear}/${currentMonth}`;

        document.getElementById('copyright-year-range').textContent = displayText;


        /* ===== 三态主题系统 ===== */
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const THEMES = {
            SYSTEM: 'system',
            LIGHT: 'light',
            DARK: 'dark'
        };

        const getSystemTheme = () => {
            return window.matchMedia('(prefers-color-scheme: dark)').matches 
                ? 'dark' 
                : 'light';
        };

        const getCurrentMode = () => {
            return localStorage.getItem('theme-mode') || THEMES.SYSTEM;
        };

        const setMode = (mode) => {
            localStorage.setItem('theme-mode', mode);
            applyTheme();
        };

        const applyTheme = () => {
            const mode = getCurrentMode();
            let finalTheme;

            if (mode === THEMES.SYSTEM) {
                finalTheme = getSystemTheme();
                themeToggle.innerHTML = '<i class="fas fa-desktop"></i>';
            } 
            else if (mode === THEMES.DARK) {
                finalTheme = 'dark';
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } 
            else {
                finalTheme = 'light';
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }

            body.classList.toggle('dark', finalTheme === 'dark');
        };

        // 点击循环切换
        themeToggle.addEventListener('click', () => {
            const mode = getCurrentMode();

            if (mode === THEMES.SYSTEM) {
                setMode(THEMES.LIGHT);
            } 
            else if (mode === THEMES.LIGHT) {
                setMode(THEMES.DARK);
            } 
            else {
                setMode(THEMES.SYSTEM);
            }
        });

        // 仅 system 模式跟随系统变化
        window.matchMedia('(prefers-color-scheme: dark)')
            .addEventListener('change', () => {
                if (getCurrentMode() === THEMES.SYSTEM) {
                    applyTheme();
                }
            });

        // 初始化主题
        applyTheme();


        /* ===== 网格点击动画 ===== */
        document.querySelectorAll('.grid-item').forEach(item => {
            item.addEventListener('click', function () {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 300);
            });
        });


        /* ===== Header 交互 ===== */
        const header = document.querySelector('header');

        header.addEventListener('mouseenter', () => {
            header.classList.add('active');
        });

        header.addEventListener('mouseleave', () => {
            header.classList.remove('active');
        });

        header.addEventListener('click', (e) => {
            if (e.target === header || e.target.closest('.friend-link')) return;
            header.classList.toggle('active');
        });

        /* ===== 从 JSON 读取模块 ===== */

        fetch('jsons/modules.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('moduleContainer');

                data.forEach(item => {

                    const card = document.createElement('div');
                    card.className = 'grid-item';
                    card.onclick = () => window.open(item.link, '_blank', 'noopener,noreferrer');

                    card.innerHTML = `
                        <div class="item-header">
                            <h3 class="item-title">${item.name}</h3>
                        </div>
                        <div class="item-content">
                            <p class="item-desc">${item.desc}</p>
                            <div class="item-footer">
                                <span class="category-tag">${item.tag}</span>
                                <div class="item-link">
                                    访问 <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        </div>
                    `;

                    container.appendChild(card);
                });

                // 生成后再绑定点击动画
                document.querySelectorAll('.grid-item').forEach(item => {
                    item.addEventListener('click', function () {
                        this.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            this.style.transform = '';
                        }, 300);
                    });
                });
            })
            .catch(err => {
                console.error('模块加载失败:', err);
            });

    });
    </script>
</body>
</html>
